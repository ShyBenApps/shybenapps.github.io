<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pikori - Email link opened</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#14C8C4" />
  <style>
    :root {
      --bg: #0d1113;
      --card: #151b1d;
      --text: #f4fbfb;
      --muted: #a8b7b7;
      --primary: #14c8c4;
      --primary-soft: rgba(20, 200, 196, 0.14);
      --border: #243033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #162225 0%, var(--bg) 58%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(21, 27, 29, 0.96);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .app-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      object-fit: cover;
      display: block;
      margin: 0 auto 18px;
      box-shadow: 0 10px 30px rgba(20, 200, 196, 0.18);
      background: var(--primary-soft);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .install-note {
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: var(--primary-soft);
      border: 1px solid rgba(20, 200, 196, 0.22);
      color: var(--text);
      font-size: 16px;
      line-height: 1.55;
      font-weight: 600;
    }

    strong {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <main class="card">
    <img
      class="app-icon"
      src="/assets/pikori_icon.png"
      alt="Pikori"
    />

    <h1>Thank you for using Pikori!</h1>

    <div class="install-note">
      You can now open the <strong>Pikori</strong> app on your phone and log into your account.
    </div>

  </main>
</body>
</html>
